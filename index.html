<!DOCTYPE html>

<head>
<meta charset="UTF-8">

<title>Melm</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    background-image:url("black check box.jpg");
    background-repeat:repeat;
    background-size:auto;
    background-color:#0d0d0d;
    font-family:Arial, sans-serif;
}

/* Banner */

header{
    width:100%;
    height:250px;

    background-image:url("banner lights heart.jpg");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

    position:relative;
    overflow:hidden;

    box-shadow:0 5px 25px rgba(220,20,60,0.5);
}

header::before{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.55);
    z-index:1;
}

/* Profile Picture */

.pfp{
    position:absolute;
    left:40px;
    top:50%;
    transform:translateY(-50%);

    width:190px;
    height:190px;

    border-radius:50%;
    object-fit:cover;

    border:5px solid white;

    z-index:2;

    box-shadow:
        0 0 20px #ffffff,
        0 0 35px #dc143c,
        0 0 60px #dc143c;
}

/* Name */

.profile-name{
    position:absolute;

    left:250px;
    top:45%;

    transform:translateY(-50%);

    color:#f5d6d6;

    font-size:38px;
    font-weight:bold;

    z-index:2;

    text-shadow:
        0 0 10px #dc143c,
        0 0 20px rgba(0,0,0,0.6);
}

/* Status */

.status{
    position:absolute;

    left:250px;
    top:60%;

    transform:translateY(-50%);

    z-index:2;

    color:#d6c7c7;
    font-size:14px;

    background:rgba(0,0,0,0.7);

    border:1px solid #dc143c;
    border-radius:20px;

    padding:8px 14px;

    box-shadow:
        0 0 10px rgba(220,20,60,.4);
}

/* Main Container */

.container{
    max-width:900px;

    margin:30px auto;
    padding:25px;

    background:rgba(15,15,15,0.95);

    border-radius:20px;

    box-shadow:
        0 0 15px rgba(220,20,60,0.5),
        0 0 35px rgba(220,20,60,0.25);
}

h1{
    text-align:center;

    color:#dc143c;

    margin-bottom:15px;

    text-shadow:
        0 0 10px #dc143c;
}

p{
    color:#d6c7c7;

    margin-bottom:10px;
    line-height:1.6;
}

/* Spotify */

.spotify{
    width:100%;

    margin:20px 0;

    border:2px solid #dc143c;
    border-radius:20px;

    overflow:hidden;

    box-shadow:
        0 0 15px rgba(220,20,60,0.4);
}

/* Bottom Section */

.bottom-row{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;

    margin-top:25px;
}

/* Discord */

.discord-tag{
    display:inline-block;

    padding:12px 18px;

    background:#1a1a1a;

    border:2px solid #dc143c;
    border-radius:15px;

    color:#f5d6d6;
    font-weight:bold;

    box-shadow:
        0 0 10px #dc143c,
        0 0 25px #dc143c,
        0 0 40px #dc143c;
}

/* Sticker */

.sticker{
    width:220px;
    height:auto;
    transition:0.3s;
}

.sticker:hover{
    transform:scale(1.05);
}

/* Footer */

footer{
    width:100%;

    margin-top:30px;
    padding:20px;

    text-align:center;

    color:#f5d6d6;

    background:#111111;

    border-top:2px solid #dc143c;

    box-shadow:
        0 0 20px rgba(220,20,60,0.4);
}

</style>

</head>
